version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: chore(ci)
